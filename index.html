<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store Bot — Command List</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #16161f;
    --border: #1e1e2e;
    --accent: #7c6aff;
    --accent2: #ff6a9e;
    --accent3: #6affcc;
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --text-dim: #3a3a50;
    --owner: #ffd700;
    --admin: #7c6aff;
    --user: #6affcc;
    --danger: #ff4d6d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
    opacity: 0.15;
  }
  .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -100px; left: -100px; animation: float1 12s ease-in-out infinite; }
  .blob-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -50px; animation: float2 15s ease-in-out infinite; }
  .blob-3 { width: 300px; height: 300px; background: var(--accent3); top: 50%; left: 50%; transform: translate(-50%,-50%); animation: float3 10s ease-in-out infinite; }

  @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,20px)} }
  @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-30px)} }
  @keyframes float3 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.2)} }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 60px 24px 100px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 64px;
    animation: fadeDown 0.8s ease both;
  }
  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(124,106,255,0.1);
    border: 1px solid rgba(124,106,255,0.3);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 24px;
  }
  .header-badge::before { content: '●'; font-size: 8px; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  h1 {
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #fff 30%, var(--accent) 70%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
  }
  .header-sub {
    color: var(--text-muted);
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.01em;
  }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 48px;
    animation: fadeDown 0.8s 0.1s ease both;
  }
  .stat {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 18px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .stat strong { color: var(--text); font-weight: 700; }

  /* Search */
  .search-wrap {
    position: relative;
    margin-bottom: 48px;
    animation: fadeDown 0.8s 0.15s ease both;
  }
  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 20px;
    color: var(--text-muted);
    pointer-events: none;
  }
  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 20px 16px 52px;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #search::placeholder { color: var(--text-dim); }
  #search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,255,0.15);
  }

  /* Filter tabs */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 40px;
    animation: fadeDown 0.8s 0.2s ease both;
  }
  .filter-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .filter-btn .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  /* Section */
  .section {
    margin-bottom: 48px;
    animation: fadeUp 0.6s ease both;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .section-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .section-icon.owner { background: rgba(255,215,0,0.1); }
  .section-icon.admin { background: rgba(124,106,255,0.1); }
  .section-icon.user  { background: rgba(106,255,204,0.1); }
  .section-icon.ai    { background: rgba(255,106,158,0.1); }
  .section-icon.group { background: rgba(255,150,50,0.1); }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .section-title.owner { color: var(--owner); }
  .section-title.admin { color: var(--admin); }
  .section-title.user  { color: var(--user); }
  .section-title.ai    { color: var(--accent2); }
  .section-title.group { color: #ff9632; }

  .section-count {
    margin-left: auto;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 3px 10px;
    border-radius: 100px;
  }

  /* Command grid */
  .cmd-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 10px;
  }

  .cmd-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    cursor: default;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .cmd-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: 14px;
  }
  .cmd-card.owner::before { background: radial-gradient(circle at top left, rgba(255,215,0,0.06), transparent 60%); }
  .cmd-card.admin::before { background: radial-gradient(circle at top left, rgba(124,106,255,0.06), transparent 60%); }
  .cmd-card.user::before  { background: radial-gradient(circle at top left, rgba(106,255,204,0.06), transparent 60%); }
  .cmd-card.ai::before    { background: radial-gradient(circle at top left, rgba(255,106,158,0.06), transparent 60%); }
  .cmd-card.group::before { background: radial-gradient(circle at top left, rgba(255,150,50,0.06), transparent 60%); }

  .cmd-card:hover {
    transform: translateY(-2px);
    border-color: rgba(124,106,255,0.3);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .cmd-card:hover::before { opacity: 1; }

  .cmd-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
  }
  .cmd-name {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }
  .cmd-name span {
    font-weight: 400;
    color: var(--text-muted);
    font-size: 12px;
  }
  .cmd-badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 100px;
    flex-shrink: 0;
  }
  .cmd-badge.owner { background: rgba(255,215,0,0.15); color: var(--owner); }
  .cmd-badge.admin { background: rgba(124,106,255,0.15); color: var(--admin); }
  .cmd-badge.user  { background: rgba(106,255,204,0.15); color: var(--user); }
  .cmd-badge.ai    { background: rgba(255,106,158,0.15); color: var(--accent2); }
  .cmd-badge.group { background: rgba(255,150,50,0.15); color: #ff9632; }

  .cmd-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    font-weight: 400;
  }

  /* No results */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    display: none;
  }
  .no-results.show { display: block; }
  .no-results-icon { font-size: 40px; margin-bottom: 12px; }
  .no-results p { font-size: 14px; }

  /* Footer */
  .footer {
    text-align: center;
    padding-top: 48px;
    border-top: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    animation: fadeUp 0.6s 0.5s ease both;
  }

  @keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(20px)}  to{opacity:1;transform:translateY(0)} }

  .hidden { display: none !important; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  @media(max-width:600px) {
    .cmd-grid { grid-template-columns: 1fr; }
    .stats { gap: 8px; }
    .stat { padding: 8px 12px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="wrapper">

  <!-- Header -->
  <div class="header">
    <div class="header-badge">Store Bot v5.2 — Live</div>
    <h1>Command Reference</h1>
    <p class="header-sub">Daftar lengkap semua command bot toko Telegram</p>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat"><span>👑</span> Owner <strong id="cnt-owner">0</strong></div>
    <div class="stat"><span>⚙️</span> Admin <strong id="cnt-admin">0</strong></div>
    <div class="stat"><span>🤖</span> AI <strong id="cnt-ai">0</strong></div>
    <div class="stat"><span>👥</span> Grup <strong id="cnt-group">0</strong></div>
    <div class="stat"><span>🛍️</span> User <strong id="cnt-user">0</strong></div>
    <div class="stat"><span>📋</span> Total <strong id="cnt-total">0</strong></div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Cari command... ( /input, /konfirmasi, ... )" autocomplete="off" spellcheck="false">
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all"><span class="dot"></span> Semua</button>
    <button class="filter-btn" data-filter="owner"><span class="dot"></span> Owner</button>
    <button class="filter-btn" data-filter="admin"><span class="dot"></span> Admin</button>
    <button class="filter-btn" data-filter="ai"><span class="dot"></span> AI</button>
    <button class="filter-btn" data-filter="group"><span class="dot"></span> Grup</button>
    <button class="filter-btn" data-filter="user"><span class="dot"></span> User</button>
  </div>

  <!-- Command Sections -->
  <div id="cmd-container"></div>
  <div class="no-results" id="no-results">
    <div class="no-results-icon">🔍</div>
    <p>Tidak ada command yang cocok</p>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>Store Bot v5.2 &nbsp;·&nbsp; by @bujajg &nbsp;·&nbsp; <span id="total-footer"></span> commands</p>
  </div>

</div>

<script>
const COMMANDS = [
  // ── OWNER ──────────────────────────────────────────────
  { cat:'owner', cmd:'/clone_bot',         args:'[token] [nama] [hari]',  desc:'Buat clone bot baru dengan token dan masa aktif' },
  { cat:'owner', cmd:'/start_clone',       args:'[nama]',                  desc:'Jalankan clone bot yang sudah dibuat' },
  { cat:'owner', cmd:'/stop_clone',        args:'[nama]',                  desc:'Hentikan clone bot yang sedang berjalan' },
  { cat:'owner', cmd:'/delete_clone',      args:'[nama]',                  desc:'Hapus clone bot secara permanen' },
  { cat:'owner', cmd:'/list_clones',       args:'',                        desc:'Lihat semua clone bot beserta status & sisa hari' },
  { cat:'owner', cmd:'/perpanjang_clone',  args:'[nama] [hari]',           desc:'Perpanjang masa aktif clone bot' },
  { cat:'owner', cmd:'/update_clone',      args:'[nama]',                  desc:'Update script satu clone bot & restart otomatis' },
  { cat:'owner', cmd:'/update_all_clones', args:'',                        desc:'Update & restart semua clone bot sekaligus' },
  { cat:'owner', cmd:'/cek_token',         args:'[token]',                 desc:'Cek apakah token bot valid sebelum dibuat clone' },
  { cat:'owner', cmd:'/tambah_admin',      args:'[user_id] [nama]',        desc:'Tambah admin baru ke bot' },
  { cat:'owner', cmd:'/hapus_admin',       args:'[user_id]',               desc:'Hapus admin dari bot' },
  { cat:'owner', cmd:'/list_admin',        args:'',                        desc:'Lihat daftar semua admin' },
  { cat:'owner', cmd:'/blokir',            args:'[user_id] [alasan]',      desc:'Blokir user dari menggunakan bot' },
  { cat:'owner', cmd:'/unblokir',          args:'[user_id]',               desc:'Unblokir user yang sebelumnya diblokir' },
  { cat:'owner', cmd:'/set_nama',          args:'[nama baru]',             desc:'Ubah nama toko / bot' },
  { cat:'owner', cmd:'/maintenance',       args:'on / off',                desc:'Aktifkan atau matikan mode maintenance' },
  { cat:'owner', cmd:'/broadcast',         args:'[pesan]',                 desc:'Kirim pesan ke semua pelanggan sekaligus' },

  // ── ADMIN ──────────────────────────────────────────────
  { cat:'admin', cmd:'/input',             args:'',                        desc:'Input produk baru — Kategori | Produk | Paket | Harga | Desc' },
  { cat:'admin', cmd:'/tambah_produk',     args:'',                        desc:'Input produk preset (USA FS/Fans/Ganom, Indo FS, WA)' },
  { cat:'admin', cmd:'/hapus_kategori',    args:'[id]',                    desc:'Hapus kategori beserta semua produk & stok di dalamnya' },
  { cat:'admin', cmd:'/hapus_produk',      args:'[id]',                    desc:'Hapus produk beserta semua paket & stok akunnya' },
  { cat:'admin', cmd:'/hapus_plan',        args:'[plan_id]',               desc:'Hapus satu paket/plan beserta stok akunnya' },
  { cat:'admin', cmd:'/ubah_harga',        args:'[plan_id] [harga]',       desc:'Ubah harga paket — kirim tanpa argumen untuk lihat daftar' },
  { cat:'admin', cmd:'/list_produk',       args:'',                        desc:'Lihat semua produk beserta ID & jumlah paket' },
  { cat:'admin', cmd:'/list_kategori',     args:'',                        desc:'Lihat semua kategori beserta ID' },
  { cat:'admin', cmd:'/daftar_produk',     args:'',                        desc:'Lihat produk lengkap dengan Plan ID & stok akun' },
  { cat:'admin', cmd:'/daftar_kategori',   args:'',                        desc:'Lihat kategori lengkap dengan ID' },
  { cat:'admin', cmd:'/input_stok',        args:'[plan_id]',               desc:'Input akun ke stok — kirim tanpa argumen untuk pilih plan' },
  { cat:'admin', cmd:'/tambah_qris',       args:'[kode] [nama] [nomor]',   desc:'Tambah metode pembayaran QRIS/rekening baru' },
  { cat:'admin', cmd:'/hapus_qris',        args:'[kode]',                  desc:'Hapus metode pembayaran' },
  { cat:'admin', cmd:'/upload_qris',       args:'[kode]',                  desc:'Upload gambar QR — reply ke foto lalu ketik command' },
  { cat:'admin', cmd:'/list_qris',         args:'',                        desc:'Lihat semua metode pembayaran yang terdaftar' },
  { cat:'admin', cmd:'/bersih_qris',       args:'',                        desc:'Hapus semua QRIS yang belum ada gambarnya' },
  { cat:'admin', cmd:'/konfirmasi',        args:'[invoice_id]',            desc:'Konfirmasi pembayaran order — akun terkirim otomatis' },
  { cat:'admin', cmd:'/batal_order',       args:'[invoice_id] [alasan]',   desc:'Batalkan order & notif ke customer' },
  { cat:'admin', cmd:'/kirim_akun',        args:'[user_id] [akun/data]',   desc:'Kirim akun/data secara manual ke customer' },
  { cat:'admin', cmd:'/cekorder',          args:'[invoice_id]',            desc:'Cek detail & status order berdasarkan ID' },
  { cat:'admin', cmd:'/buat_pengumuman',   args:'[judul] | [isi]',         desc:'Buat pengumuman baru yang tampil di menu Promo' },
  { cat:'admin', cmd:'/hapus_pengumuman',  args:'[id]',                    desc:'Hapus pengumuman berdasarkan ID' },

  // ── AI ────────────────────────────────────────────────
  { cat:'ai', cmd:'/set_ai_key',    args:'[mistral_api_key]',   desc:'Set API key Mistral AI — pesan otomatis terhapus setelah disimpan' },
  { cat:'ai', cmd:'/set_ai_prompt', args:'[prompt]',            desc:'Set custom system prompt untuk AI customer service' },
  { cat:'ai', cmd:'/ai_on',         args:'',                    desc:'Aktifkan AI CS untuk chat private' },
  { cat:'ai', cmd:'/ai_off',        args:'',                    desc:'Matikan AI CS untuk chat private' },
  { cat:'ai', cmd:'/ai_grup_on',    args:'',                    desc:'Aktifkan AI di grup — balas mention/reply saja' },
  { cat:'ai', cmd:'/ai_grup_off',   args:'',                    desc:'Matikan AI di grup' },
  { cat:'ai', cmd:'/ai_grup_full',  args:'',                    desc:'AI grup full mode — balas semua pesan terkait toko' },
  { cat:'ai', cmd:'/ai_grup_normal',args:'',                    desc:'Kembalikan AI grup ke mode normal (mention/reply only)' },
  { cat:'ai', cmd:'/info_ai',       args:'',                    desc:'Lihat status AI — key, mode private & grup' },
  { cat:'ai', cmd:'/tanya',         args:'[pertanyaan]',        desc:'Tanya langsung ke AI dari admin panel' },

  // ── GRUP ─────────────────────────────────────────────
  { cat:'group', cmd:'/manage',      args:'',                   desc:'Buka panel kelola grup — hanya di dalam grup' },
  { cat:'group', cmd:'/setwelcome',  args:'[teks]',             desc:'Set pesan selamat datang untuk member baru' },
  { cat:'group', cmd:'/rules',       args:'',                   desc:'Tampilkan peraturan grup' },
  { cat:'group', cmd:'/setrules',    args:'[teks]',             desc:'Set peraturan grup' },
  { cat:'group', cmd:'/warn',        args:'@user [alasan]',     desc:'Beri peringatan ke member — 3 warn = kick otomatis' },
  { cat:'group', cmd:'/mute',        args:'@user [menit]',      desc:'Mute member — tidak bisa kirim pesan' },
  { cat:'group', cmd:'/unmute',      args:'@user',              desc:'Unmute member' },
  { cat:'group', cmd:'/kick',        args:'@user [alasan]',     desc:'Kick member dari grup' },
  { cat:'group', cmd:'/tagadmin',    args:'',                   desc:'Tag semua admin grup' },
  { cat:'group', cmd:'/announce',    args:'[pesan]',            desc:'Kirim pengumuman ke grup' },
  { cat:'group', cmd:'/del',         args:'',                   desc:'Hapus pesan — reply ke pesan yang ingin dihapus' },
  { cat:'group', cmd:'/antilink',    args:'on / off',           desc:'Aktifkan/matikan filter link otomatis di grup' },
  { cat:'group', cmd:'/antikasar',   args:'on / off',           desc:'Aktifkan/matikan filter kata kasar di grup' },

  // ── USER ─────────────────────────────────────────────
  { cat:'user', cmd:'/start',   args:'',                desc:'Mulai bot & tampilkan menu utama' },
  { cat:'user', cmd:'/menu',    args:'',                desc:'Tampilkan menu utama' },
  { cat:'user', cmd:'/list',    args:'',                desc:'Lihat semua produk yang tersedia beserta harga' },
  { cat:'user', cmd:'/pay',     args:'',                desc:'Lihat metode & informasi pembayaran' },
  { cat:'user', cmd:'/cekorder',args:'[invoice_id]',    desc:'Cek status order milikmu' },
];

// ─── Render ───────────────────────────────────────────────

const CATS = {
  owner: { label:'Owner',  icon:'👑', cls:'owner' },
  admin: { label:'Admin',  icon:'⚙️', cls:'admin' },
  ai:    { label:'AI',     icon:'🤖', cls:'ai'    },
  group: { label:'Grup',   icon:'👥', cls:'group' },
  user:  { label:'User',   icon:'🛍️', cls:'user'  },
};

function render(filter='all', query='') {
  const container = document.getElementById('cmd-container');
  const noResults = document.getElementById('no-results');
  container.innerHTML = '';

  const q = query.toLowerCase().trim();
  let totalShown = 0;

  Object.entries(CATS).forEach(([catKey, catInfo], i) => {
    if (filter !== 'all' && filter !== catKey) return;

    const cmds = COMMANDS.filter(c => {
      if (c.cat !== catKey) return false;
      if (!q) return true;
      return c.cmd.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q) || c.args.toLowerCase().includes(q);
    });

    if (!cmds.length) return;
    totalShown += cmds.length;

    const section = document.createElement('div');
    section.className = 'section';
    section.style.animationDelay = (i * 0.05) + 's';

    section.innerHTML = `
      <div class="section-header">
        <div class="section-icon ${catInfo.cls}">${catInfo.icon}</div>
        <span class="section-title ${catInfo.cls}">${catInfo.label}</span>
        <span class="section-count">${cmds.length} commands</span>
      </div>
      <div class="cmd-grid">
        ${cmds.map(c => `
          <div class="cmd-card ${catInfo.cls}">
            <div class="cmd-top">
              <div class="cmd-name">${c.cmd}${c.args ? ` <span>${c.args}</span>` : ''}</div>
              <span class="cmd-badge ${catInfo.cls}">${catInfo.label}</span>
            </div>
            <div class="cmd-desc">${c.desc}</div>
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(section);
  });

  noResults.classList.toggle('show', totalShown === 0);
}

function updateStats() {
  const counts = {};
  Object.keys(CATS).forEach(k => counts[k] = COMMANDS.filter(c=>c.cat===k).length);
  document.getElementById('cnt-owner').textContent = counts.owner;
  document.getElementById('cnt-admin').textContent = counts.admin;
  document.getElementById('cnt-ai').textContent    = counts.ai;
  document.getElementById('cnt-group').textContent = counts.group;
  document.getElementById('cnt-user').textContent  = counts.user;
  document.getElementById('cnt-total').textContent = COMMANDS.length;
  document.getElementById('total-footer').textContent = COMMANDS.length;
}

// ─── Events ───────────────────────────────────────────────

let activeFilter = 'all';

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render(activeFilter, document.getElementById('search').value);
  });
});

document.getElementById('search').addEventListener('input', e => {
  render(activeFilter, e.target.value);
});

// Init
updateStats();
render();
</script>
</body>
</html>
